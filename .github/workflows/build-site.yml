name: Build website

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-site-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Graphing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Graphing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Upload generated site
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: Graphing/out
          if-no-files-found: error
